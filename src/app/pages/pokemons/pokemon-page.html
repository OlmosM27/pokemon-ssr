<h1 class="text-3xl">Listado de Pokemon</h1>
<h2 class="text-xl">Página actual: {{ currentPage() }}</h2>

<hr class="my-2" />

<pokemon-list [pokemon]="pokemon()" />
<!-- @if (!isLoading()) {
} @else {
  <pokemon-list-skeleton />
} -->

<div class="flex justify-between">
  <button
    [disabled]="currentPage() === 1"
    [routerLink]="['/pokemon/page', currentPage()! - 1]"
    class="mt-2"
  >
    Anteriores
  </button>
  <button [routerLink]="['/pokemon/page', currentPage()! + 1]" class="mt-2">Siguientes</button>
</div>
