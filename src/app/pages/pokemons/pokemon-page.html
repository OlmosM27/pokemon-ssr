<h1 class="text-3xl">Listado de Pokemon</h1>
<h2 class="text-xl">Página actual: {{ currentPage() }}</h2>

<hr class="my-2" />

@if (!isLoading()) {
  <pokemon-list [pokemon]="pokemon()" />
} @else {
  <pokemon-list-skeleton />
}

<div class="flex justify-between">
  <button (click)="loadPokemon(-1)" class="mt-2">Anteriores</button>
  <button (click)="loadPokemon(+1)" class="mt-2">Siguientes</button>
</div>
